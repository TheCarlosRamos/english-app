<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbs - English Quiz Level 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dark-bg {
            background: #0f0f0f;
        }
        .choice-card {
            transition: all 0.3s ease;
            transform: translateY(0);
        }
        .choice-card:hover:not(.selected) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .choice-card.correct {
            background: #1a3d1a;
            border-color: #22c55e;
            color: white;
        }
        .choice-card.incorrect {
            background: #3d1a1a;
            border-color: #ef4444;
            color: white;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen dark-bg text-white">
    <!-- Navigation -->
    <nav class="bg-gray-900 border-b border-gray-700">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-gray-300 font-semibold text-lg hover:text-white transition">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Menu
                </a>
                <h1 class="text-2xl font-bold text-white">
                    <i class="fas fa-running mr-2"></i>Verbs Quiz
                </h1>
                <div class="text-gray-300 font-semibold">
                    Level 4
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <!-- Start Screen -->
        <div id="start" class="max-w-2xl mx-auto text-center">
            <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl p-8 fade-in">
                <i class="fas fa-running text-6xl text-gray-400 mb-6"></i>
                <h2 class="text-3xl font-bold text-white mb-4">Verb Challenge</h2>
                <p class="text-gray-400 mb-8">Test your knowledge of English verbs and their Portuguese translations</p>
                <button id="begin" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-4 px-8 rounded-lg transition duration-300 transform hover:scale-105">
                    <i class="fas fa-play mr-2"></i>Start Quiz
                </button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz" style="display:none" class="max-w-3xl mx-auto">
            <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl p-8 fade-in">
                <!-- Progress Bar -->
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-gray-400">Question <span id="current-question">1</span> of 10</span>
                        <span class="text-sm font-medium text-gray-400">Score: <span id="score" class="text-white font-bold">0</span></span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-2">
                        <div id="progress-bar" class="bg-gray-500 h-2 rounded-full transition-all duration-300" style="width: 10%"></div>
                    </div>
                </div>

                <!-- Question -->
                <div class="text-center mb-8">
                    <h2 id="term" class="text-3xl font-bold text-white mb-2"></h2>
                    <p class="text-gray-400">Choose the correct Portuguese translation:</p>
                </div>

                <!-- Choices -->
                <div id="choices" class="grid gap-4 mb-8"></div>

                <!-- Next Button -->
                <div class="text-center">
                    <button id="next" disabled class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition duration-300">
                        Next Question <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end" style="display:none" class="max-w-2xl mx-auto text-center">
            <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl p-8 fade-in">
                <i class="fas fa-trophy text-6xl text-yellow-500 mb-6"></i>
                <h2 class="text-3xl font-bold text-white mb-4">Quiz Complete!</h2>
                <div class="text-5xl font-bold text-white mb-6">
                    <span id="final"></span>
                </div>
                <p class="text-gray-400 mb-8">Great job! You've completed the verb quiz.</p>
                <div class="flex gap-4 justify-center">
                    <button onclick="location.reload()" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg transition duration-300">
                        <i class="fas fa-redo mr-2"></i>Try Again
                    </button>
                    <a href="index.html" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 px-6 rounded-lg transition duration-300">
                        <i class="fas fa-home mr-2"></i>Back to Menu
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="core.js"></script>
    <script src="verbs.js"></script>
</body>
</html>
